<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8">

    <!-- Logo / Título -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Esqueci minha senha</h1>
      <p class="text-gray-500 text-sm mt-1">
        Informe seu e-mail e enviaremos um link para redefinir sua senha.
      </p>
    </div>

    <!-- Formulário — esconde após envio -->
    <form *ngIf="!enviado" [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          E-mail
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <!-- Erro de validação do campo -->
        <span
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
          class="text-red-500 text-xs mt-1 block"
        >
          Informe um e-mail válido.
        </span>
      </div>

      <!-- Botão de envio -->
      <button
        type="submit"
        [disabled]="carregando || form.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-medium py-2 rounded-lg transition-colors"
      >
        {{ carregando ? 'Enviando...' : 'Enviar link de recuperação' }}
      </button>

      <!-- Link voltar ao login -->
      <p class="text-center text-sm text-gray-500">
        Lembrou a senha?
        <a routerLink="/auth/login" class="text-blue-600 hover:underline">Voltar ao login</a>
      </p>

    </form>

    <!-- Mensagem após envio -->
    <div *ngIf="enviado" class="text-center space-y-4">
      <div class="text-green-600 text-4xl">✉️</div>
      <p class="text-gray-700 font-medium">{{ mensagem }}</p>
      <a routerLink="/auth/login" class="text-blue-600 text-sm hover:underline">
        Voltar ao login
      </a>
    </div>

  </div>
</div>
