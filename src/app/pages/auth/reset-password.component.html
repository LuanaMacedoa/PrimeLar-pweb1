<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8">

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Redefinir senha</h1>
      <p class="text-gray-500 text-sm mt-1">Escolha uma nova senha para sua conta.</p>
    </div>

    <!-- Erro de token inválido / ausente -->
    <div *ngIf="erro && !sucesso" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">
      <p class="text-red-600 text-sm">{{ erro }}</p>
      <a routerLink="/auth/esqueci-senha" class="text-blue-600 text-sm hover:underline mt-2 block">
        Solicitar novo link
      </a>
    </div>

    <!-- Formulário — só aparece se tiver token válido e não tiver concluído -->
    <form
      *ngIf="token && !sucesso && !erro"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="space-y-4"
    >
      <div>
        <label for="novaSenha" class="block text-sm font-medium text-gray-700 mb-1">
          Nova senha
        </label>
        <input
          id="novaSenha"
          type="password"
          formControlName="novaSenha"
          placeholder="Mínimo 6 caracteres"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <span
          *ngIf="form.get('novaSenha')?.invalid && form.get('novaSenha')?.touched"
          class="text-red-500 text-xs mt-1 block"
        >
          A senha deve ter no mínimo 6 caracteres.
        </span>
      </div>

      <div>
        <label for="confirmarSenha" class="block text-sm font-medium text-gray-700 mb-1">
          Confirmar nova senha
        </label>
        <input
          id="confirmarSenha"
          type="password"
          formControlName="confirmarSenha"
          placeholder="Repita a senha"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Erro de senhas diferentes -->
      <p *ngIf="erro" class="text-red-500 text-sm">{{ erro }}</p>

      <button
        type="submit"
        [disabled]="carregando || form.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-medium py-2 rounded-lg transition-colors"
      >
        {{ carregando ? 'Salvando...' : 'Redefinir senha' }}
      </button>

    </form>

    <!-- Mensagem de sucesso -->
    <div *ngIf="sucesso" class="text-center space-y-3">
      <div class="text-green-500 text-4xl">✅</div>
      <p class="text-gray-700 font-medium">{{ mensagem }}</p>
      <p class="text-gray-400 text-sm">Redirecionando para o login...</p>
    </div>

  </div>
</div>
