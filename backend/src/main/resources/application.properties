spring.application.name=backend

# Datasource — valores sobrescritos pelo docker-compose via env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/primelar}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:primelar}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

api.security.token.secret=my-secret-key
 
# CORS Config
primelar.cors.allowed-origins=http://localhost:4200

# HTTPS e Proxy Reverso
server.forward-headers-strategy=framework

# application.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu_email@gmail.com
spring.mail.password=sua_senha_de_app_google
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL base do frontend 
app.frontend.url=http://localhost:4200

