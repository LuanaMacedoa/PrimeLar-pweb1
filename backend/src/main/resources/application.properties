spring.application.name=backend

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/primelar}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:primelar}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Não é necessário especificar o dialect nas versões atuais do Hibernate
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — valor abaixo e apenas para desenvolvimento local
# Em producao use a variavel JWT_SECRET via application-prod.properties
api.security.token.secret=${JWT_SECRET:dev-secret-key-nao-usar-em-producao}

# CORS
primelar.cors.allowed-origins=http://localhost:4200

# Proxy
server.forward-headers-strategy=framework

# Frontend URL (para links de recuperação de senha)
app.frontend.url=http://localhost:4200

# Upload de imagens de imóveis
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu-email@gmail.com
spring.mail.password=sua-senha-de-app
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true