spring.application.name=backend

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/primelar}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:primelar}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Não é necessário especificar o dialect nas versões atuais do Hibernate
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
api.security.token.secret=my-secret-key

# CORS
primelar.cors.allowed-origins=http://localhost:4200

# Proxy
server.forward-headers-strategy=framework
